<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProQuiz | Dynamic Assessment</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        body.dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.3s;
            padding-bottom: 100px;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background: var(--card-bg); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

        .question-card {
            background: var(--card-bg); padding: 24px; border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin: 15px auto;
            max-width: 600px;
        }

        .option-label {
            display: flex; align-items: center; padding: 14px; margin-bottom: 12px;
            border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
            transition: 0.2s;
        }

        .option-label:has(input:checked) { border-color: var(--primary); background: rgba(37, 99, 235, 0.05); }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center; z-index: 200;
            backdrop-filter: blur(5px);
        }

        .modal-card {
            background: var(--card-bg); padding: 30px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 400px;
        }

        .modal-btns {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px;
        }

        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card-bg); display: flex; padding: 15px;
            border-top: 1px solid var(--border); gap: 10px; align-items: center;
        }

        .scoreboard {
            max-width: 500px; margin: 20px auto; padding: 30px;
            background: var(--card-bg); border-radius: 24px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="navbar">
        <span class="logo">PRO QUIZ</span>
        <div id="timer" class="hidden" style="font-weight: 700; background: #334155; color: white; padding: 5px 14px; border-radius: 20px; font-size: 0.9rem;">00:00</div>
        <button id="theme-toggle" style="background:none; border:none; font-size: 1.2rem; cursor:pointer;">🌙</button>
    </nav>

    <div id="setup-screen" style="max-width: 400px; margin: 60px auto; padding: 20px; text-align: center;">
        <h2 style="margin-bottom: 10px;">Quiz Dashboard</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Upload your .txt file to start the assessment.</p>
        <input type="number" id="minutes" placeholder="Timer (minutes)" style="width:100%; padding:14px; margin-bottom:15px; border-radius:10px; border:1px solid var(--border); background: var(--card-bg); color: var(--text);">
        <button class="btn btn-primary" style="width: 100%;" onclick="document.getElementById('upload').click()">Upload Quiz File</button>
        <input type="file" id="upload" accept=".txt" class="hidden">
    </div>

    <div id="checkpoint-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div style="font-size: 3rem; margin-bottom: 10px;">🎯</div>
            <h3>Set Completed</h3>
            <p style="opacity: 0.8;">You've finished this section. Choose your next step:</p>
            <div class="modal-btns">
                <button class="btn btn-success" id="btn-submit-set">Submit Test</button>
                <button class="btn btn-primary" id="btn-continue-quiz">Continue</button>
            </div>
            <button class="btn btn-outline" style="width: 100%; margin-top: 10px;" onclick="document.getElementById('checkpoint-modal').classList.add('hidden')">Cancel</button>
        </div>
    </div>

    <div id="quiz-area" class="hidden">
        <div class="question-card">
            <div id="quiz-content"></div>
        </div>
    </div>

    <div id="score-screen" class="hidden" style="padding: 15px;">
        <div class="scoreboard">
            <div id="final-percent" style="font-size: 3.5rem; font-weight: 900; color: var(--primary);">0%</div>
            <p id="score-text" style="margin-bottom: 30px; font-weight: 600;"></p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                <div style="background: var(--bg); padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--success);">
                    <div id="stat-correct" style="font-size: 1.5rem; font-weight: 800; color: var(--success);">0</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">Correct</div>
                </div>
                <div style="background: var(--bg); padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--error);">
                    <div id="stat-wrong" style="font-size: 1.5rem; font-weight: 800; color: var(--error);">0</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">Wrong</div>
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" id="review-btn">Review My Answers</button>
            <button class="btn btn-outline" style="width: 100%;" onclick="location.reload()">New Quiz</button>
        </div>
    </div>

    <div id="nav-bar" class="bottom-nav hidden">
        <button class="btn btn-outline" id="prev-btn" style="width: 80px;">Prev</button>
        <div id="progress" style="flex-grow:1; text-align:center; font-weight:800; font-size: 1rem;"></div>
        <button class="btn btn-primary" id="next-btn" style="width: 80px;">Next</button>
    </div>

    <script>
        let quizData = [];
        let currentIdx = 0;
        let userAnswers = [];
        let timerInterval;
        let isReviewMode = false;
        let submittedAtCount = 0; // Tracks if user submitted at a checkpoint

        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            document.getElementById('theme-toggle').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        };

        document.getElementById('upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                parseQuestions(ev.target.result);
                if (quizData.length > 0) startQuiz();
            };
            reader.readAsText(e.target.files[0]);
        };

        function parseQuestions(text) {
            quizData = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
            let q = null;

            lines.forEach(line => {
                const questionMatch = line.match(/^(?:Q|Question)\s*\d*[:.\s]*/i);
                if (questionMatch) {
                    if (q) quizData.push(q);
                    q = { question: line.replace(questionMatch[0], "").trim(), options: [], answer: "" };
                } else if (line.match(/^\([a-z]\)/i)) {
                    if (q) q.options.push(line);
                } else if (line.match(/^(?:A|Answer|Ans)\s*[:.\s]*/i)) {
                    if (q) {
                        const answerMatch = line.match(/^(?:A|Answer|Ans)\s*[:.\s]*/i);
                        q.answer = line.replace(answerMatch[0], "").trim();
                    }
                }
            });
            if (q) quizData.push(q);
            if (quizData.length === 0) alert("Format Error: Ensure your file uses Q1: and A: format.");
        }

        function startQuiz() {
            const mins = parseInt(document.getElementById('minutes').value) || 20;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('nav-bar').classList.remove('hidden');
            document.getElementById('timer').classList.remove('hidden');
            userAnswers = new Array(quizData.length).fill(null);
            runTimer(mins);
            showQuestion(0);
        }

        function showQuestion(idx) {
            currentIdx = idx;
            const q = quizData[idx];
            const content = document.getElementById('quiz-content');
            
            content.innerHTML = `
                <div style="color: var(--primary); font-weight:800; margin-bottom:10px; font-size: 0.85rem; text-transform: uppercase;">Question ${idx + 1}</div>
                <div style="font-size: 1.25rem; margin-bottom:25px; font-weight: 600; line-height: 1.4;">${q.question}</div>
                ${q.options.map(opt => `
                    <label class="option-label">
                        <input type="radio" name="opt" value="${opt}" ${userAnswers[idx] === opt ? 'checked' : ''} ${isReviewMode ? 'disabled' : ''}>
                        <span style="margin-left: 10px;">${opt}</span>
                    </label>
                `).join('')}
            `;

            if(isReviewMode) {
                const isCorrect = userAnswers[idx] === q.answer;
                const feedback = document.createElement('div');
                feedback.style.cssText = `margin-top:20px; padding:15px; border-radius:12px; font-weight:700; border: 1px solid;`;
                feedback.style.background = isCorrect ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
                feedback.style.color = isCorrect ? 'var(--success)' : 'var(--error)';
                feedback.style.borderColor = isCorrect ? 'var(--success)' : 'var(--error)';
                feedback.innerHTML = `${isCorrect ? '✓ Correct' : '✗ Incorrect'}<br><span style="font-size:0.9rem; opacity:0.8;">Right Answer: ${q.answer}</span>`;
                content.appendChild(feedback);
            }

            document.getElementById('progress').innerText = `${idx + 1} / ${quizData.length}`;
            document.getElementById('prev-btn').disabled = (idx === 0);
            document.getElementById('next-btn').innerText = (idx === quizData.length - 1) ? "Finish" : "Next";
            
            content.querySelectorAll('input').forEach(i => {
                i.onchange = () => userAnswers[currentIdx] = i.value;
            });
        }

        document.getElementById('next-btn').onclick = () => {
            if (!isReviewMode && (currentIdx + 1) % 20 === 0 && (currentIdx + 1) < quizData.length) {
                document.getElementById('checkpoint-modal').classList.remove('hidden');
            } else if (currentIdx === quizData.length - 1) {
                submittedAtCount = quizData.length;
                showScoreBoard();
            } else {
                showQuestion(currentIdx + 1);
            }
        };

        document.getElementById('btn-continue-quiz').onclick = () => {
            document.getElementById('checkpoint-modal').classList.add('hidden');
            showQuestion(currentIdx + 1);
        };

        document.getElementById('btn-submit-set').onclick = () => {
            submittedAtCount = currentIdx + 1; // Calculate score based on current question
            showScoreBoard();
        };

        document.getElementById('prev-btn').onclick = () => showQuestion(currentIdx - 1);

        function showScoreBoard() {
            clearInterval(timerInterval);
            document.getElementById('checkpoint-modal').classList.add('hidden');
            
            let totalToCalculate = submittedAtCount || quizData.length;
            let correct = 0;
            
            for(let i = 0; i < totalToCalculate; i++) {
                if(userAnswers[i] === quizData[i].answer) correct++;
            }
            
            const percent = Math.round((correct / totalToCalculate) * 100);

            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('nav-bar').classList.add('hidden');
            document.getElementById('timer').classList.add('hidden');
            document.getElementById('score-screen').classList.remove('hidden');

            document.getElementById('final-percent').innerText = `${percent}%`;
            document.getElementById('score-text').innerText = `You scored ${correct} out of ${totalToCalculate}`;
            document.getElementById('stat-correct').innerText = correct;
            document.getElementById('stat-wrong').innerText = totalToCalculate - correct;
        }

        document.getElementById('review-btn').onclick = () => {
            isReviewMode = true;
            document.getElementById('score-screen').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('nav-bar').classList.remove('hidden');
            showQuestion(0);
        };

        function runTimer(m) {
            let s = m * 60;
            timerInterval = setInterval(() => {
                const min = Math.floor(s / 60);
                const sec = s % 60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (s <= 0) {
                    submittedAtCount = quizData.length;
                    showScoreBoard();
                }
                s--;
            }, 1000);
        }
    </script>
</body>
</html>
